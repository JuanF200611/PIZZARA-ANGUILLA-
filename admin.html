<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Máster | Anguilla Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0c14;
            --card-bg: #121624;
            --card-border: #1e2538;
            --neon-blue: #00f0ff;
            --neon-orange: #ff7900;
            --neon-green: #39ff14;
            --neon-red: #e63946;
            --text-light: #ffffff;
            --text-muted: #8a99ad;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-light); 
            margin: 0; 
            padding: 15px;
            box-sizing: border-box;
        }

        .dashboard { 
            max-width: 1600px; 
            margin: 0 auto; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }
        
        header { 
            text-align: center; 
            padding-bottom: 15px; 
            border-bottom: 1px solid var(--card-border); 
        }
        header h1 { 
            font-size: 1.8rem; 
            font-weight: 800; 
            background: linear-gradient(135deg, var(--neon-orange), var(--neon-blue)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            margin: 0; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .main-layout { 
            display: flex;
            flex-direction: column;
            gap: 20px; 
        }

        .grid-sections { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 20px; 
        }

        @media (min-width: 768px) {
            .grid-sections { 
                grid-template-columns: 1fr 1fr; 
            }
        }
        
        /* Tarjetas */
        .panel-card { 
            background: var(--card-bg); 
            border-radius: 14px; 
            padding: 20px; 
            border: 1px solid var(--card-border); 
            box-shadow: 0 8px 24px rgba(0,0,0,0.6); 
        }
        .panel-card h2 { 
            margin-top: 0; 
            font-size: 1.1rem; 
            border-left: 4px solid var(--neon-orange); 
            padding-left: 10px; 
            margin-bottom: 15px; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Formularios y controles */
        .flex-input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        @media (min-width: 480px) {
            .flex-input-group { flex-direction: row; }
        }

        .control-row { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            margin-bottom: 15px; 
            background: #191f33; 
            padding: 10px; 
            border-radius: 8px; 
        }
        
        input[type="date"], input[type="text"], input[type="number"] {
            background: #090b12; 
            border: 1px solid var(--card-border); 
            color: #fff; 
            padding: 12px; 
            border-radius: 8px; 
            font-family: inherit; 
            font-size: 0.95rem; 
            width: 100%; 
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        input:focus { 
            border-color: var(--neon-blue); 
            outline: none; 
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2); 
        }

        /* Botones optimizados para Touch */
        .btn { 
            padding: 12px 20px; 
            border: none; 
            border-radius: 8px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: 0.2s; 
            font-family: inherit; 
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 44px; 
        }
        .btn-block { width: 100%; }
        .btn-orange { background: var(--neon-orange); color: white; }
        .btn-orange:hover { background: #e06a00; }
        .btn-green { background: var(--neon-green); color: #000; }
        .btn-green:hover { background: #2ee610; }
        .btn-danger { background: var(--neon-red); color: white; }
        .btn-danger:hover { background: #bd2c38; }
        
        .live-active { background: var(--neon-red) !important; animation: pulseLive 1.5s infinite alternate; color: white; }

        /* Contenedores de Sorteos */
        .sorteos-container { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            max-height: 60vh; 
            overflow-y: auto; 
            padding-right: 5px; 
        }
        .sorteo-item { 
            display: flex; 
            flex-direction: column;
            gap: 12px;
            background: #171c2e; 
            padding: 15px; 
            border-radius: 10px; 
            border-left: 5px solid var(--neon-blue); 
        }
        @media (min-width: 400px) {
            .sorteo-item {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
            }
        }
        .sorteo-time { font-weight: 700; font-size: 1.1rem; color: #cbd5e0; }
        
        /* Esferas de premios */
        .balls-group { display: flex; gap: 10px; justify-content: center; }
        .ball-inp { 
            width: 46px; 
            height: 46px; 
            border-radius: 50% !important; 
            border: 2px solid #2d3554 !important; 
            text-align: center; 
            font-size: 1.2rem; 
            font-weight: 800; 
            color: var(--neon-blue); 
            background: #0a0c14; 
            padding: 0 !important;
        }

        /* ESTILOS NUEVOS PARA ANUNCIOS CON VISTA PREVIA Y SWITCH */
        .ad-item { 
            background: #171c2e; 
            padding: 15px; 
            border-radius: 10px; 
            margin-bottom: 12px; 
            border: 1px dashed var(--card-border); 
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .ad-row-main {
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }
        .ad-preview-box {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            background: #090b12;
            border: 1px solid var(--card-border);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }
        .ad-preview-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .ad-preview-box .no-img {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-align: center;
            padding: 5px;
        }
        .ad-fields {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-group { margin-bottom: 0; }
        .form-group label { font-size: 0.85rem; color: var(--text-muted); display: block; margin-bottom: 4px; }

        /* Estilos del Switch de activación */
        .switch-container {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #2d3554;
            transition: .3s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--neon-green); }
        input:checked + .slider:before { transform: translateX(22px); }

        .preview-horizontal { 
            width: 100%;
        }
        .monitor-header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .iframe-container-horizontal { 
            width: 100%; 
            height: 250px; 
            background: #000; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 2px solid var(--card-border); 
            position: relative; 
        }
        @media (min-width: 580px) { .iframe-container-horizontal { height: 350px; } }
        @media (min-width: 900px) { .iframe-container-horizontal { height: 480px; } }
        @media (min-width: 1400px) { .iframe-container-horizontal { height: 560px; } }

        .iframe-container-horizontal iframe { width: 100%; height: 100%; border: none; }
        .preview-badge { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.85); padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; color: var(--neon-blue); border: 1px solid var(--neon-blue); pointer-events: none; }

        @keyframes pulseLive { 0% { box-shadow: 0 0 5px var(--neon-red); } 100% { box-shadow: 0 0 20px var(--neon-red); } }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 10px; }
    </style>
</head>
<body>

<div class="dashboard">
    <header>
        <h1>Anguilla Master Dashboard</h1>
        <p style="color: var(--text-muted); margin: 5px 0 0 0; font-size: 0.9rem;">Control unificado optimizado para computadoras y móviles</p>
    </header>

    <div class="main-layout">
        
        <div class="panel-card preview-horizontal">
            <div class="monitor-header-flex">
                <h2 style="margin: 0;">Monitor en Tiempo Real</h2>
                <button class="btn btn-orange" style="min-height:36px; padding: 6px 15px; background: #1e2538; color: #fff;" onclick="recargarMonitor()">Recargar Monitor</button>
            </div>
            <div class="iframe-container-horizontal">
                <div class="preview-badge">VISTA PREVIA DE LA PIZARRA ACTIVA</div>
                <iframe src="index.html" id="monitorFrame"></iframe>
            </div>
        </div>
        
        <div style="display: flex; flex-direction: column; gap: 15px;">
            
            <div class="panel-card" style="border: 1px solid rgba(0, 240, 255, 0.3);">
                <h2>Configuración General del Sistema</h2>
                <div class="form-group" style="margin-bottom: 12px;">
                    <label>Tiempo de duración por Pantalla / Rotación (Segundos):</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="number" id="globalTimeInp" placeholder="Ej: 15" min="3" style="max-width: 150px;">
                        <button class="btn btn-orange" onclick="guardarTiempoGlobal()">Actualizar Tiempo</button>
                    </div>
                </div>
            </div>

            <div class="panel-card">
                <h2>Texto Informativo Superior (Cabecera)</h2>
                <div class="flex-input-group">
                    <input type="text" id="marqueeInp" placeholder="Escribe avisos aquí...">
                    <button class="btn btn-green" onclick="guardarCintillo()">Actualizar</button>
                </div>
            </div>

            <div class="panel-card" style="border: 1px solid rgba(230, 57, 70, 0.3);">
                <h2>Control de Sorteos en Vivo</h2>
                <div style="display: flex; flex-direction: column; gap: 12px;">
                    <div class="form-group" style="margin: 0;">
                        <label>Enlace de YouTube Live:</label>
                        <input type="text" id="streamingUrlInp" placeholder="https://www.youtube.com/watch?v=...">
                    </div>
                    <div style="display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap;">
                        <button class="btn btn-danger" id="btnStopLive" onclick="detenerTransmision()">■ Detener</button>
                        <button class="btn btn-orange" id="btnStartLive" onclick="iniciarTransmision()">▶ Lanzar En Vivo</button>
                    </div>
                </div>
            </div>

            <div class="grid-sections">
                <div class="panel-card">
                    <h2>Resultados de Premios</h2>
                    <div class="control-row">
                        <div style="flex: 1; margin-right: 10px;">
                            <input type="date" id="targetDate" onchange="fetchSorteos()">
                        </div>
                        <button class="btn btn-orange" id="btnInit" style="display:none;" onclick="crearEstructuraBase()">Inicializar Día</button>
                    </div>
                    <div class="sorteos-container" id="listado"></div>
                </div>

                <div class="panel-card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                        <h2 style="margin: 0;">Lista de Anuncios</h2>
                        <button class="btn btn-orange" style="padding: 5px 12px; font-size: 0.85rem;" onclick="agregarNuevoAnuncioVacio()">+ Añadir</button>
                    </div>
                    
                    <div id="contenedorAnuncios" style="max-height: 50vh; overflow-y: auto; padding-right: 5px;"></div>
                    <button class="btn btn-green btn-block" style="margin-top: 15px;" onclick="guardarTodosLosAnuncios()">Guardar Todos los Anuncios</button>
                </div>
            </div>

        </div>

    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = { databaseURL: "https://pizarra-loteria-36ba5-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const CRONOGRAMA_HORAS = [
        "08:00AM", "09:00AM", "10:00AM", "11:00AM", "12:00PM", 
        "01:00PM", "02:00PM", "03:00PM", "04:00PM", "05:00PM", 
        "06:00PM", "07:00PM", "08:00PM", "09:00PM", "10:00PM"
    ];

    window.onload = () => {
        document.getElementById('targetDate').value = new Date().toISOString().split('T')[0];
        fetchSorteos();
        fetchCintilloYAnuncios();
        escucharEstadoTransmision();
        fetchConfiguracionGlobal();
    };

    function recargarMonitor() {
        const frame = document.getElementById('monitorFrame');
        frame.src = frame.src;
    }

    function fetchConfiguracionGlobal() {
        database.ref('configuracion/tiempoPantalla').on('value', snap => {
            if(snap.val()) document.getElementById('globalTimeInp').value = snap.val();
        });
    }

    function guardarTiempoGlobal() {
        const tiempo = document.getElementById('globalTimeInp').value.trim();
        if(!tiempo || tiempo < 3) {
            alert("Por favor introduce un tiempo válido (mínimo 3 segundos).");
            return;
        }
        database.ref('configuracion/tiempoPantalla').set(parseInt(tiempo), err => {
            if(!err) alert("¡Tiempo de rotación actualizado globalmente!");
        });
    }

    function fetchCintilloYAnuncios() {
        database.ref('ticker').on('value', snap => {
            if(snap.val()) document.getElementById('marqueeInp').value = snap.val();
        });

        database.ref('anunciosList').once('value', snap => {
            const container = document.getElementById('contenedorAnuncios');
            container.innerHTML = "";
            let contador = 0;
            snap.forEach(child => {
                const data = child.val();
                // Si la propiedad 'activo' no existe en la base de datos vieja, por defecto será true
                const isActivo = data.activo !== undefined ? data.activo : true;
                inyectarEstructuraAnuncio(contador, data.url, data.tiempo, isActivo);
                contador++;
            });
        });
    }

    function escucharEstadoTransmision() {
        database.ref('transmisionVivo').on('value', snap => {
            const data = snap.val();
            const btnStart = document.getElementById('btnStartLive');
            const btnStop = document.getElementById('btnStopLive');
            const inpUrl = document.getElementById('streamingUrlInp');

            if (data && data.activo === true) {
                btnStart.innerText = "● EN VIVO EMITIENDO";
                btnStart.classList.add('live-active');
                if(!inpUrl.value) inpUrl.value = data.url || "";
                btnStop.style.display = "inline-flex";
            } else {
                btnStart.innerText = "▶ Lanzar En Vivo Now";
                btnStart.classList.remove('live-active');
                btnStop.style.display = "none";
                if(data && data.url) inpUrl.value = data.url;
            }
        });
    }

    function iniciarTransmision() {
        const urlValue = document.getElementById('streamingUrlInp').value.trim();
        if(!urlValue) {
            alert("Por favor, introduce un enlace válido de YouTube.");
            return;
        }
        database.ref('transmisionVivo').set({ activo: true, url: urlValue }, err => {
            if(!err) alert("¡Transmisión en vivo activada!");
        });
    }

    function detenerTransmision() {
        const urlValue = document.getElementById('streamingUrlInp').value.trim();
        database.ref('transmisionVivo').set({ activo: false, url: urlValue }, err => {
            if(!err) alert("Transmisión finalizada.");
        });
    }

    // FUNCIÓN PARA EXTRAER MINIATURAS (IMÁGENES O YOUTUBE)
    function obtenerMiniaturaUrl(url) {
        if (!url) return "";
        
        // Comprobar si es un enlace de YouTube estándar o shortener
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        
        if (match && match[2].length === 11) {
            // Retorna la miniatura por defecto de alta calidad de YouTube
            return `https://img.youtube.com/vi/${match[2]}/mqdefault.jpg`;
        }
        
        // Si no es youtube, asume que es un enlace directo de imagen normal
        return url;
    }

    // FUNCIÓN ACTUALIZADA CON VISTA PREVIA DINÁMICA Y BOTÓN DE ACTIVACIÓN/DESACTIVACIÓN
    function inyectarEstructuraAnuncio(id, url="", tiempo="15", activo=true) {
        const div = document.createElement('div');
        div.className = "ad-item";
        div.id = `ad_box_${id}`;
        
        const previewSrc = obtenerMiniaturaUrl(url);
        const hasPreview = previewSrc !== "";

        div.innerHTML = `
            <div class="ad-row-main">
                <div class="ad-preview-box" id="preview_img_box_${id}">
                    ${hasPreview ? `<img src="${previewSrc}" onerror="this.style.display='none'; document.getElementById('no_img_${id}').style.display='block';">` : ''}
                    <div class="no-img" id="no_img_${id}" style="display: ${hasPreview ? 'none' : 'block'};">Sin vista previa</div>
                </div>
                
                <div class="ad-fields">
                    <div class="form-group">
                        <label>Enlace de Imagen o YouTube:</label>
                        <input type="text" class="input-ad-url" value="${url}" placeholder="https://..." oninput="actualizarMiniaturaDinamica(${id}, this.value)">
                    </div>
                </div>
            </div>

            <div style="display:flex; gap:15px; align-items:center; justify-content: space-between; flex-wrap: wrap;">
                <div style="display: flex; gap: 15px; align-items: center;">
                    <div style="width: 80px;">
                        <label class="form-group"><span style="font-size: 0.85rem; color: var(--text-muted);">Segundos:</span></label>
                        <input type="number" class="input-ad-time" value="${tiempo}" min="3" style="padding: 6px 10px;">
                    </div>
                    
                    <div style="margin-top: 15px;">
                        <label class="switch-container">
                            <div class="switch">
                                <input type="checkbox" class="input-ad-status" ${activo ? 'checked' : ''}>
                                <span class="slider"></span>
                            </div>
                            <span style="font-size: 0.85rem; color: var(--text-muted);">Activo</span>
                        </label>
                    </div>
                </div>
                
                <button class="btn btn-danger" style="min-height: 36px; padding: 6px 15px; margin-top:10px;" onclick="eliminarNodoAd(${id})">Eliminar</button>
            </div>`;
        document.getElementById('contenedorAnuncios').appendChild(div);
    }

    // Actualiza la foto/miniatura mientras el usuario escribe o pega un link
    function actualizarMiniaturaDinamica(id, url) {
        const box = document.getElementById(`preview_img_box_${id}`);
        const noImgLabel = document.getElementById(`no_img_${id}`);
        const src = obtenerMiniaturaUrl(url.trim());

        // Limpiar imágenes previas dentro de la caja
        const imgExistente = box.querySelector('img');
        if(imgExistente) imgExistente.remove();

        if (src) {
            const nuevaImg = document.createElement('img');
            nuevaImg.src = src;
            nuevaImg.onerror = () => {
                nuevaImg.style.display = 'none';
                noImgLabel.style.display = 'block';
            };
            box.insertBefore(nuevaImg, noImgLabel);
            noImgLabel.style.display = 'none';
        } else {
            noImgLabel.style.display = 'block';
        }
    }

    function agregarNuevoAnuncioVacio() {
        let idSiguiente = document.querySelectorAll('.ad-item').length;
        inyectarEstructuraAnuncio(idSiguiente, "", "15", true);
    }

    function eliminarNodoAd(id) {
        const el = document.getElementById(`ad_box_${id}`);
        if(el) el.remove();
    }

    // FUNCIÓN GUARDAR MODIFICADA PARA EXTRAER ADEMÁS EL ESTADO DEL SWITCH (ACTIVO TRUE/FALSE)
    function guardarTodosLosAnuncios() {
        let lista = [];
        const urls = document.querySelectorAll('.input-ad-url');
        const tiempos = document.querySelectorAll('.input-ad-time');
        const estados = document.querySelectorAll('.input-ad-status');

        urls.forEach((el, index) => {
            if(el.value.trim() !== "") {
                lista.push({
                    url: el.value.trim(),
                    tiempo: tiempos[index].value || "15",
                    activo: estados[index].checked // Guarda true si está encendido, false si está apagado
                });
            }
        });

        database.ref('anunciosList').set(lista, err => {
            if(err) alert("Fallo al guardar anuncios");
            else alert("¡Anuncios guardados exitosamente con sus estados!");
        });
    }

    function guardarCintillo() {
        const texto = document.getElementById('marqueeInp').value;
        database.ref('ticker').set(texto, err => {
            if(!err) alert("Texto actualizado globalmente.");
        });
    }

    function fetchSorteos() {
        const fecha = document.getElementById('targetDate').value;
        const listado = document.getElementById('listado');
        listado.innerHTML = "<p style='color:#a0aec0;'>Buscando registros...</p>";
        document.getElementById('btnInit').style.display = 'none';

        database.ref(`sorteos/${fecha}`).on('value', snapshot => {
            const data = snapshot.val();
            listado.innerHTML = "";

            if (data) {
                data.forEach((s, idx) => {
                    if (!s) return;
                    listado.innerHTML += `
                        <div class="sorteo-item">
                            <div class="sorteo-time">${s.hora}</div>
                            <div class="balls-group">
                                <input type="number" pattern="[0-9]*" inputmode="numeric" class="ball-inp" id="n_${idx}_0" value="${s.premios?.[0] || ""}" oninput="if(this.value.length > 2) this.value = this.value.slice(0,2)">
                                <input type="number" pattern="[0-9]*" inputmode="numeric" class="ball-inp" id="n_${idx}_1" value="${s.premios?.[1] || ""}" oninput="if(this.value.length > 2) this.value = this.value.slice(0,2)">
                                <input type="number" pattern="[0-9]*" inputmode="numeric" class="ball-inp" id="n_${idx}_2" value="${s.premios?.[2] || ""}" oninput="if(this.value.length > 2) this.value = this.value.slice(0,2)">
                            </div>
                            <button class="btn btn-green" style="min-width: 60px; padding: 8px;" onclick="actualizarSorteo(${idx})">Ok</button>
                        </div>`;
                });
            } else {
                listado.innerHTML = "<p style='color:#718096;'>No hay sorteos creados hoy.</p>";
                document.getElementById('btnInit').style.display = 'block';
            }
        });
    }

    function crearEstructuraBase() {
        const fecha = document.getElementById('targetDate').value;
        const nuevaData = CRONOGRAMA_HORAS.map(hora => ({
            fecha, hora, noche: false, premios: ["", "", ""]
        }));
        database.ref(`sorteos/${fecha}`).set(nuevaData, () => { fetchSorteos(); });
    }

    function actualizarSorteo(idx) {
        const fecha = document.getElementById('targetDate').value;
        const p0 = document.getElementById(`n_${idx}_0`).value;
        const p1 = document.getElementById(`n_${idx}_1`).value;
        const p2 = document.getElementById(`n_${idx}_2`).value;

        database.ref(`sorteos/${fecha}/${idx}/premios`).set([p0, p1, p2]);
    }
</script>
</body>
</html>
